services:
  beebot:
    image: ghcr.io/hive76/beebot:latest
    container_name: beebot
    restart: unless-stopped

    extra_hosts:
      - "host.docker.internal:host-gateway"

    env_file:
      - .env

    volumes:
      # Knowledge base persists between restarts and is written by sync container
      - beebot_data:/app/data
      # Service account JSON — keep outside image, mount read-only
      - ./config/service-account.json:/app/config/service-account.json:ro

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    healthcheck:
      test: ["CMD", "sh", "-c", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Separate sync container — runs once and exits
  # Trigger manually or via cron on host:
  #   docker compose run --rm beebot-sync
  beebot-sync:
    image: ghcr.io/hive76/beebot:latest
    container_name: beebot-sync
    restart: "no"
    user: "0:0"   # sync writes to the shared volume; root avoids permission issues

    extra_hosts:
      - "host.docker.internal:host-gateway"

    env_file:
      - .env

    volumes:
      - beebot_data:/app/data
      - ./config/service-account.json:/app/config/service-account.json:ro

    command: ["python", "sync/sync_docs.py"]

  # Auto-update: image pulls are handled by a host cron job (see README Step 5)
  # This avoids Docker socket permission issues with userns-remap.

volumes:
  beebot_data:
    driver: local
